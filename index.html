<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>韓国漢字音クイズ｜한자음 단어 퀴즈</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Serif+KR:wght@400;600;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1a1410; --paper:#f7f1e6; --paper2:#efe6d3;
    --crimson:#c8362f; --crimson-d:#9e241f; --gold:#d99a2b;
    --jade:#4a7c59; --jade-l:#7fae87; --line:#d8c9ab;
    --shadow:rgba(60,40,20,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Zen Maru Gothic',sans-serif; color:var(--ink);
    background:
      radial-gradient(circle at 12% 18%, rgba(216,154,43,.10), transparent 42%),
      radial-gradient(circle at 88% 82%, rgba(74,124,89,.10), transparent 42%),
      repeating-linear-gradient(45deg, rgba(0,0,0,.012) 0 2px, transparent 2px 9px),
      var(--paper);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:22px 16px 60px;
  }
  header{width:100%;max-width:720px;text-align:center;margin-bottom:18px}
  .seal{
    display:inline-flex;align-items:center;justify-content:center;
    width:54px;height:54px;border-radius:14px;
    background:linear-gradient(155deg,var(--crimson),var(--crimson-d));
    color:#fff;font-family:'Noto Serif KR',serif;font-weight:900;font-size:1.7rem;
    box-shadow:0 6px 14px rgba(158,36,31,.4), inset 0 2px 4px rgba(255,255,255,.25);
    transform:rotate(-4deg);margin-bottom:8px;
  }
  h1{font-family:'Black Han Sans','Zen Maru Gothic',sans-serif;font-size:1.9rem;letter-spacing:.04em;line-height:1.15;color:var(--crimson-d)}
  h1 .jp{display:block;font-family:'Zen Maru Gothic';font-weight:700;font-size:.92rem;color:var(--jade);letter-spacing:.1em;margin-top:6px}
  .subtitle{font-size:.82rem;color:#6f6354;margin-top:6px;letter-spacing:.05em}

  .topbar{width:100%;max-width:720px;display:flex;align-items:center;gap:14px;margin-bottom:14px}
  .pbar-wrap{flex:1;height:12px;background:var(--paper2);border-radius:99px;overflow:hidden;box-shadow:inset 0 1px 3px var(--shadow);border:1px solid var(--line)}
  .pbar{height:100%;width:0;background:linear-gradient(90deg,var(--jade-l),var(--jade));border-radius:99px;transition:width .45s cubic-bezier(.16,1,.3,1)}
  .score-pill{font-weight:700;font-size:.85rem;background:#fff;border:1.5px solid var(--line);border-radius:99px;padding:6px 14px;white-space:nowrap;box-shadow:0 2px 5px var(--shadow)}
  .score-pill b{color:var(--crimson)}

  .card{
    width:100%;max-width:720px;background:#fffdf8;border:1px solid var(--line);border-radius:22px;
    box-shadow:0 18px 40px -18px var(--shadow), 0 2px 0 #fff inset;
    padding:30px 28px 26px;position:relative;overflow:hidden;
  }
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--crimson),var(--gold),var(--jade))}
  .qmeta{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
  .qnum{font-weight:700;color:var(--jade);font-size:.85rem;letter-spacing:.08em}
  .qtag{font-size:.72rem;background:var(--paper2);color:#7a6c54;border-radius:8px;padding:4px 10px;font-weight:700;border:1px solid var(--line)}

  .prompt{text-align:center;margin:6px 0 26px}
  .prompt .lead{font-size:.92rem;color:#6f6354;margin-bottom:16px}
  .word{
    font-family:'Noto Serif KR',serif;font-weight:900;font-size:4rem;line-height:1;color:var(--ink);
    display:inline-block;padding:0 8px;text-shadow:2px 3px 0 rgba(200,54,47,.12);
  }
  .reading{margin-top:14px}
  .reading .jp-read{font-size:1.7rem;font-weight:700;color:var(--crimson);letter-spacing:.05em}
  .reading .mean{display:block;font-size:.85rem;color:#9a8b73;margin-top:4px;letter-spacing:.04em}
  .ask{font-size:.98rem;font-weight:700;margin-top:18px;color:var(--ink)}
  .ask em{color:var(--crimson);font-style:normal;border-bottom:3px solid var(--gold)}

  .choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:540px){.choices{grid-template-columns:1fr}.word{font-size:3.1rem}h1{font-size:1.55rem}}
  .choice{
    font-family:'Noto Serif KR','Zen Maru Gothic',serif;font-size:1.7rem;font-weight:600;color:var(--ink);
    background:#fff;border:2px solid var(--line);border-radius:14px;padding:18px 12px;cursor:pointer;
    text-align:center;position:relative;transition:transform .12s, box-shadow .15s, border-color .15s, background .15s;
    box-shadow:0 3px 0 var(--paper2);user-select:none;
  }
  .choice .idx{position:absolute;top:8px;left:11px;font-family:'Zen Maru Gothic';font-size:.72rem;font-weight:700;color:#bdae93}
  .choice:hover:not(:disabled){transform:translateY(-2px);border-color:var(--gold);box-shadow:0 6px 0 var(--paper2)}
  .choice:active:not(:disabled){transform:translateY(1px);box-shadow:0 1px 0 var(--paper2)}
  .choice:disabled{cursor:default}
  .choice.correct{background:linear-gradient(160deg,#eaf6ec,#d6efdb);border-color:var(--jade);color:var(--jade);animation:pop .35s}
  .choice.wrong{background:linear-gradient(160deg,#fdeceb,#fbdcda);border-color:var(--crimson);color:var(--crimson-d)}
  .choice.muted{opacity:.45}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.07)}100%{transform:scale(1)}}

  .explain{margin-top:20px;border-radius:16px;overflow:hidden;border:1.5px solid var(--line);background:#fff;max-height:0;opacity:0;transition:max-height .5s ease, opacity .4s}
  .explain.show{max-height:760px;opacity:1}
  .explain-head{display:flex;align-items:center;gap:9px;padding:12px 18px;font-weight:700;font-size:.95rem}
  .explain-head.ok{background:linear-gradient(90deg,#e7f4ea,#f3faf4);color:var(--jade)}
  .explain-head.ng{background:linear-gradient(90deg,#fbe9e8,#fdf4f3);color:var(--crimson-d)}
  .explain-head .mk{font-size:1.3rem}
  .explain-body{padding:14px 18px 18px;font-size:.9rem;line-height:1.85;color:#4a4034}
  .explain-body .ko{font-family:'Noto Serif KR',serif;font-weight:600;color:var(--crimson-d);background:rgba(216,154,43,.14);padding:1px 7px;border-radius:6px}
  .rule-chip{display:inline-block;font-size:.74rem;font-weight:700;color:#fff;background:var(--jade);padding:3px 10px;border-radius:7px;margin-bottom:10px;letter-spacing:.03em}
  .breakdown{font-family:'Zen Maru Gothic';background:var(--paper);border:1px dashed var(--line);border-radius:10px;padding:12px 14px;margin-top:12px;font-size:.92rem;line-height:1.9;color:#5a4f40}
  .breakdown .syl{display:inline-block;margin-right:6px}
  .breakdown b{color:var(--crimson)}

  .related-words{margin-top:16px;padding-top:14px;border-top:1px dashed var(--line)}
  .related-label{font-size:.78rem;font-weight:700;color:#9a8b73;margin-bottom:10px;letter-spacing:.05em}
  .rel-grid{display:flex;flex-wrap:wrap;gap:8px}
  .rel-card{background:var(--paper);border:1px solid var(--line);border-radius:10px;padding:9px 14px;display:flex;flex-direction:column;align-items:center;gap:2px;min-width:82px;cursor:default;transition:transform .12s,box-shadow .12s}
  .rel-card:hover{transform:translateY(-2px);box-shadow:0 4px 10px var(--shadow)}
  .rel-kanji{font-family:'Noto Serif KR',serif;font-size:1.05rem;font-weight:700;color:var(--ink)}
  .rel-jp{font-size:.67rem;color:#9a8b73;margin-top:1px}
  .rel-ko{font-size:.88rem;font-weight:700;color:var(--crimson-d);font-family:'Noto Serif KR',serif}

  /* ── タブナビゲーション ── */
  .tab-bar{width:100%;max-width:720px;display:flex;gap:10px;margin-bottom:16px}
  .tab{flex:1;font-family:'Zen Maru Gothic';font-weight:700;font-size:.9rem;padding:12px 8px;border:2px solid var(--line);border-radius:14px;background:#fff;cursor:pointer;color:#7a6c54;transition:all .18s;letter-spacing:.04em}
  .tab.active{background:linear-gradient(155deg,var(--crimson),var(--crimson-d));color:#fff;border-color:transparent;box-shadow:0 4px 14px -3px rgba(158,36,31,.45)}
  .tab:hover:not(.active){border-color:var(--gold);color:var(--ink);transform:translateY(-1px)}
  /* ── 学習タブ：レッスンナビ ── */
  .lesson-nav{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px}
  .lesson-btn{font-family:'Zen Maru Gothic';font-weight:700;font-size:.8rem;padding:10px 14px 9px;border:2px solid var(--line);border-radius:12px;background:#fff;cursor:pointer;color:#7a6c54;transition:all .15s;display:flex;flex-direction:column;align-items:center;line-height:1.3;text-align:center;min-width:80px}
  .lesson-btn span{font-size:.68rem;color:#9a8b73;font-weight:500}
  .lesson-btn.active{background:linear-gradient(155deg,var(--jade-l),var(--jade));color:#fff;border-color:transparent;box-shadow:0 4px 10px -3px rgba(74,124,89,.45)}
  .lesson-btn.active span{color:rgba(255,255,255,.85)}
  .lesson-btn:hover:not(.active){border-color:var(--jade-l);transform:translateY(-1px)}
  /* ── レッスンパネル ── */
  .lesson-panel{width:100%;background:#fffdf8;border:1px solid var(--line);border-radius:22px;padding:26px 24px 28px;box-shadow:0 18px 40px -18px var(--shadow),0 2px 0 #fff inset;position:relative;overflow:hidden}
  .lesson-panel::before{content:"";position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--jade),var(--gold),var(--crimson))}
  .lesson-title{font-family:'Black Han Sans','Zen Maru Gothic',sans-serif;font-size:1.3rem;color:var(--jade);margin-bottom:6px}
  .lesson-sub{font-size:.84rem;color:#9a8b73;margin-bottom:18px;line-height:1.65}
  /* ── 対応表 ── */
  .corr-table{width:100%;border-collapse:collapse;margin:4px 0 18px;font-size:.85rem}
  .corr-table th{background:var(--paper2);color:#5a4f40;font-weight:700;padding:8px 10px;text-align:left;border:1px solid var(--line);font-size:.76rem;letter-spacing:.04em}
  .corr-table td{padding:9px 10px;border:1px solid var(--line);vertical-align:middle;line-height:1.55}
  .corr-table tr:nth-child(even) td{background:rgba(239,230,211,.3)}
  .cn{color:var(--jade);font-weight:700;font-size:.78rem}
  .ck{font-family:'Noto Serif KR',serif;font-weight:700;font-size:1rem;color:var(--crimson-d)}
  .cj{font-family:'Zen Maru Gothic';font-size:.98rem;color:var(--ink);font-weight:700}
  .ce{font-size:.8rem;color:#6f6354}
  .ce b{font-family:'Noto Serif KR',serif;color:var(--ink);font-weight:700}
  /* ── ノートボックス ── */
  .note-box{background:var(--paper);border:1px dashed var(--line);border-radius:12px;padding:13px 16px;margin-top:2px;font-size:.84rem;line-height:1.85;color:#5a4f40}
  .note-box ul{margin-left:16px}
  .note-box li{margin-bottom:3px}
  .note-lbl{display:inline-block;font-size:.72rem;font-weight:700;background:var(--jade);color:#fff;padding:2px 9px;border-radius:6px;margin-bottom:8px;letter-spacing:.04em}
  /* ── 歴史カード ── */
  .hist-list{display:flex;flex-direction:column;gap:10px;margin-top:6px}
  .hist-card{border-left:4px solid var(--jade);padding:10px 14px;background:rgba(127,174,135,.07);border-radius:0 10px 10px 0;font-size:.84rem;line-height:1.8;color:#4a4034}
  .hist-q{font-weight:700;color:var(--jade);margin-bottom:3px;font-size:.88rem}
  /* ── 練習問題 ── */
  .prac-part{margin-bottom:22px}
  .prac-head{font-family:'Black Han Sans';font-size:.98rem;color:var(--crimson-d);margin-bottom:10px;padding-bottom:5px;border-bottom:2px solid var(--line)}
  .prac-q{font-size:.85rem;line-height:1.8;color:#4a4034;padding:7px 0 6px;border-bottom:1px dotted var(--line);display:flex;gap:10px}
  .prac-q:last-child{border-bottom:none}
  .pn{min-width:22px;font-weight:700;color:var(--jade);font-size:.82rem;padding-top:1px}
  .ans-toggle-wrap{margin-top:16px;text-align:center}
  .ans-toggle{font-family:'Zen Maru Gothic';font-weight:700;font-size:.88rem;padding:11px 24px;border:2px solid var(--jade);border-radius:11px;background:#fff;color:var(--jade);cursor:pointer;transition:all .15s}
  .ans-toggle:hover{background:var(--jade);color:#fff}
  .ans-box{margin-top:12px;background:var(--paper);border:1px solid var(--line);border-radius:14px;padding:14px 18px;font-size:.83rem;line-height:1.95;color:#4a4034;display:none}
  .ans-box.open{display:block;animation:fade .4s}
  .ai{display:flex;gap:8px;padding:3px 0;border-bottom:1px dotted var(--line)}
  .ai:last-child{border-bottom:none}
  .an{min-width:26px;font-weight:700;color:var(--jade);font-size:.8rem}
  .at{font-family:'Noto Serif KR',serif;font-weight:600;color:var(--crimson-d)}
  /* 韓国語読みのインラインタグ */
  .kr{font-family:'Noto Serif KR',serif;font-weight:700;color:var(--crimson-d);font-size:.9em}
  /* 練習クイズ */
  .pq-item{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .pq-q{font-size:.9rem;font-weight:700;color:var(--ink);margin-bottom:12px;line-height:1.65}
  .pq-choices{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  @media(max-width:480px){.pq-choices{grid-template-columns:1fr}}
  .pq-btn{font-family:'Noto Serif KR','Zen Maru Gothic',serif;font-size:.9rem;font-weight:600;padding:11px 12px;border:2px solid var(--line);border-radius:10px;background:#fff;cursor:pointer;color:var(--ink);transition:all .15s;text-align:center;line-height:1.4}
  .pq-btn:hover:not(:disabled){border-color:var(--gold);background:rgba(217,154,43,.07)}
  .pq-btn.pq-correct{background:linear-gradient(160deg,#eaf6ec,#d6efdb);border-color:var(--jade);color:var(--jade);animation:pop .35s}
  .pq-btn.pq-wrong{background:linear-gradient(160deg,#fdeceb,#fbdcda);border-color:var(--crimson);color:var(--crimson-d)}
  .pq-btn.pq-muted{opacity:.4}
  .pq-btn:disabled{cursor:default}
  .pq-hint{margin-top:10px;font-size:.82rem;color:#5a4f40;background:var(--paper);border-left:4px solid var(--jade);padding:8px 12px;border-radius:0 8px 8px 0;line-height:1.75;animation:fade .3s}
  .pq-hint.ok{border-left-color:var(--jade)}.pq-hint.ng{border-left-color:var(--crimson)}
  .pq-hint .mark{font-weight:700;margin-right:4px}
  .pq-score{font-weight:700;font-size:.88rem;color:var(--jade);margin-bottom:16px;padding:10px 14px;background:rgba(127,174,135,.1);border-radius:10px;border:1px solid rgba(127,174,135,.3)}

  .nav{margin-top:18px;display:flex;justify-content:flex-end}
  .btn{font-family:'Zen Maru Gothic';font-weight:700;font-size:.95rem;cursor:pointer;border:none;border-radius:12px;padding:13px 26px;color:#fff;background:linear-gradient(155deg,var(--crimson),var(--crimson-d));box-shadow:0 6px 14px -4px rgba(158,36,31,.55);transition:transform .12s}
  .btn:hover{transform:translateY(-2px)}.btn:active{transform:translateY(1px)}.btn.hidden{display:none}

  .result{display:none;text-align:center;padding:42px 24px}
  .result.show{display:block;animation:fade .6s}
  @keyframes fade{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
  .ring{position:relative;width:160px;height:160px;margin:0 auto 18px}
  .ring svg{transform:rotate(-90deg)}
  .ring .pct{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring .pct b{font-family:'Black Han Sans';font-size:2.4rem;color:var(--ink)}
  .ring .pct span{font-size:.78rem;color:#9a8b73}
  .result .big{font-family:'Black Han Sans';font-size:3rem;color:var(--crimson);line-height:1}
  .result .grade{font-size:1.2rem;font-weight:700;margin:14px 0 6px;color:var(--jade)}
  .result .msg{font-size:.92rem;color:#6f6354;line-height:1.8;margin-bottom:24px}

  footer{margin-top:26px;font-size:.74rem;color:#a89878;text-align:center;line-height:1.7;max-width:720px}
</style>
</head>
<body>
<header>
  <div class="seal">韓</div>
  <h1>韓国漢字音クイズ <span class="jp">日本語の単語から韓国漢字音を当てよう</span></h1>
  <p class="subtitle">한·일 한자음 대응 법칙 트레이닝 ・ 単語編</p>
</header>

<div class="tab-bar">
  <button class="tab active" id="tabStudy" onclick="switchTab('study')">学習</button>
  <button class="tab" id="tabQuiz" onclick="switchTab('quiz')">クイズ</button>
</div>

<div id="studyPanel" style="width:100%;max-width:720px">
  <div class="lesson-nav" id="lessonNav"></div>
  <div class="lesson-panel" id="lessonContent"></div>
</div>

<div id="quizPanel" style="width:100%;max-width:720px;display:none">
  <div class="topbar">
    <div class="pbar-wrap"><div class="pbar" id="pbar"></div></div>
    <div class="score-pill">正解 <b id="scoreNow">0</b> / <span id="qTotal">0</span></div>
  </div>
  <main class="card" id="card"></main>
</div>

<footer>
  日本語母語話者のための韓国語学習ツール ・ 教材「한자 음독의 기본 틀」準拠<br>
  読みは代表的な音読み・韓国漢字音です。
</footer>

<script>
/* ============================================================
   単語問題データ
   word    : 漢字の単語
   jp      : 日本語の音読み
   mean    : 意味（補助）
   answer  : 正しい韓国漢字音（ハングル）
   wrong   : 誤答3つ（韓国漢字音）
   rule    : 効いている対応法則
   note    : 解説（日本語）
   bd      : 文字ごとの対応の図解 [ "感=감", ... ]
   ============================================================ */
/* 各漢字に関連する単語マップ */
const RELATED = {
  "感":[{word:"感動",jp:"かんどう",ko:"감동"},{word:"感謝",jp:"かんしゃ",ko:"감사"},{word:"感情",jp:"かんじょう",ko:"감정"}],
  "覚":[{word:"覚醒",jp:"かくせい",ko:"각성"},{word:"覚悟",jp:"かくご",ko:"각오"},{word:"自覚",jp:"じかく",ko:"자각"}],
  "参":[{word:"参考",jp:"さんこう",ko:"참고"},{word:"参照",jp:"さんしょう",ko:"참조"},{word:"参拝",jp:"さんぱい",ko:"참배"}],
  "加":[{word:"加速",jp:"かそく",ko:"가속"},{word:"加工",jp:"かこう",ko:"가공"},{word:"増加",jp:"ぞうか",ko:"증가"}],
  "悪":[{word:"悪化",jp:"あっか",ko:"악화"},{word:"悪意",jp:"あくい",ko:"악의"},{word:"最悪",jp:"さいあく",ko:"최악"}],
  "魔":[{word:"魔法",jp:"まほう",ko:"마법"},{word:"魔術",jp:"まじゅつ",ko:"마술"},{word:"魔力",jp:"まりょく",ko:"마력"}],
  "緩":[{word:"緩慢",jp:"かんまん",ko:"완만"},{word:"緩衝",jp:"かんしょう",ko:"완충"},{word:"弛緩",jp:"しかん",ko:"이완"}],
  "和":[{word:"平和",jp:"へいわ",ko:"평화"},{word:"調和",jp:"ちょうわ",ko:"조화"},{word:"和解",jp:"わかい",ko:"화해"}],
  "大":[{word:"大学",jp:"だいがく",ko:"대학"},{word:"最大",jp:"さいだい",ko:"최대"},{word:"偉大",jp:"いだい",ko:"위대"}],
  "会":[{word:"会話",jp:"かいわ",ko:"회화"},{word:"会社",jp:"かいしゃ",ko:"회사"},{word:"社会",jp:"しゃかい",ko:"사회"}],
  "宅":[{word:"住宅",jp:"じゅうたく",ko:"주택"},{word:"帰宅",jp:"きたく",ko:"귀택"},{word:"宅地",jp:"たくち",ko:"택지"}],
  "配":[{word:"配達",jp:"はいたつ",ko:"배달"},{word:"配分",jp:"はいぶん",ko:"배분"},{word:"配慮",jp:"はいりょ",ko:"배려"}],

/* ハングル合成（誤答が足りない場合の保険） */
function makeSyllable(){
  const c=Math.floor(Math.random()*19), v=Math.floor(Math.random()*21);
  const jp=[0,1,4,8,16,17,21]; const j=jp[Math.floor(Math.random()*jp.length)];
  return String.fromCharCode(0xAC00 + c*588 + v*28 + j);
}
/* 答えと同じ字数のダミー単語を作る */
function makeFakeWord(len){
  let s=""; for(let i=0;i<len;i++) s+=makeSyllable(); return s;
}

/* 4択を作る：正解＋誤答3つ。足りなければ合成で補う */
function buildChoices(q){
  const set=[q.answer];
  for(const w of q.wrong){ if(set.length>=4) break; if(w && !set.includes(w)) set.push(w); }
  let guard=0;
  while(set.length<4 && guard<300){ const f=makeFakeWord(q.answer.length); if(!set.includes(f)) set.push(f); guard++; }
  set.length=Math.min(set.length,4);
  for(let i=set.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[set[i],set[j]]=[set[j],set[i]];}
  return set;
}

}

    {q:'内容（ないよう）の韓国語読みは？',c:['내용','내영','나영','냉용'],a:0,h:'ない=내(ㄴ初声→な行, ㅐ→あい)。よう=용(ㅛ+ㅇパッチム→よう)。'},
    {q:'学習（がくしゅう）の韓国語読みは？',c:['학습','악습','갈습','학십'],a:0,h:'がく=학(ㅎ初声→か行, ㅏ, パッチムㄱ→く)。しゅう=습(ㅅ初声→さ行, ㅡ+ㅂパッチム→しゅう)。'},

    {q:'大学（だいがく）の韓国語読みは？',c:['대학','태학','대악','데학'],a:0,h:'だい=대(ㄷ初声→だ行例外, ㅐ→あい)。がく=학(ㅎ初声→か行, ㅏ+ㄱパッチム→く)。'},
    {q:'新聞（しんぶん）の韓国語読みは？',c:['신문','신분','심문','진문'],a:0,h:'しん=신(ㅅ初声→さ行, ㅣ→い, パッチムㄴ→ん)。ぶん=문(ㅁ初声→ば行, ㅜ, パッチムㄴ→ん)。'},

    {q:'半分（はんぶん）の韓国語読みは？',c:['반분','판분','반부','함분'],a:0,h:'はん=반(ㅂ初声→は行, ㅏ, パッチムㄴ→ん)。ぶん=분(ㅂ初声→ば行, ㅜ, パッチムㄴ→ん)。'},
    {q:'英語（えいご）の韓国語読みは？',c:['영어','영오','염어','왕어'],a:0,h:'えい=영(ㅇ初声, ㅕ+ㅇパッチム→えい)。ご=어(ㅇ初声→が行例外)。'},
  ]

let pqState = {};

function renderPractice(part){
  const qs = PRACTICE_QUIZ[part];
  const st = pqState[part] || (pqState[part] = {score:0, done:new Map()});
  const scoreHtml = `<div class="pq-score">正解 ${st.score} / ${qs.length}</div>`;
  const items = qs.map((q,qi) => {
    const picked = st.done.has(qi) ? st.done.get(qi) : null;
    const answered = picked !== null;
    const choices = q.c.map((ch,ci) => {
      let cls = 'pq-btn';
      if(answered){ if(ci===q.a) cls+=' pq-correct'; else if(ci===picked) cls+=' pq-wrong'; else cls+=' pq-muted'; }
      return `<button class="${cls}" ${answered?'disabled':''} onclick="answerPQ(${qi},${ci},${ci===q.a},'${part}')">${ch}</button>`;
    }).join('');
    const hint = answered ? `<div class="pq-hint ${picked===q.a?'ok':'ng'}"><b>解説：</b>${q.h}</div>` : '';
    return `<div class="pq-item"><div class="pq-q"><span class="pn">${qi+1}.</span> ${q.q}</div><div class="pq-choices">${choices}</div>${hint}</div>`;
  }).join('');
  document.getElementById('lessonContent').innerHTML = scoreHtml + items;
}

function answerPQ(qi, ci, correct, part){
  const st = pqState[part] || (pqState[part] = {score:0, done:new Map()});
  if(st.done.has(qi)) return;
  st.done.set(qi, ci);
  if(correct) st.score++;
  renderPractice(part);
}

function showLesson(key){
  document.querySelectorAll('.lesson-btn').forEach(b=>b.classList.remove('active'));
  const btn = document.querySelector(`.lesson-btn[data-lesson="${key}"]`);
  if(btn) btn.classList.add('active');
  if(String(key).startsWith('p')){
    renderPractice(key);
  } else {
    document.getElementById('lessonContent').innerHTML = LESSONS_CONTENT[key] || '';
  }
}

(function initStudy(){
  const nav = document.getElementById('lessonNav');
  const ls = [
    {k:1, t:'第1課', s:'母音の対応'},
    {k:2, t:'第2課', s:'初声の対応'},
    {k:3, t:'第3課', s:'パッチムの対応'},
    {k:'p1', t:'練習', s:'韓国語読み'},
  ];
  nav.innerHTML = ls.map(l=>`<button class="lesson-btn" data-lesson="${l.k}" onclick="showLesson('${l.k}')">${l.t}<span>${l.s}</span></button>`).join('');
  document.querySelector('.lesson-btn').classList.add('active');
  showLesson(1);
})();

function buildRelatedHTML(q){
  const seen=new Set([q.word]);
  const relWords=[];
  for(const ch of q.word){
    const list=RELATED[ch];
    if(!list) continue;
    for(const r of list){ if(!seen.has(r.word)){seen.add(r.word);relWords.push(r);} }
  }
  if(relWords.length===0) return '';
  const cards=relWords.map(r=>`<div class="rel-card"><span class="rel-kanji">${r.word}</span><span class="rel-jp">${r.jp}</span><span class="rel-ko">${r.ko}</span></div>`).join('');
  return `<div class="related-words"><div class="related-label">同じ漢字が使われている単語 ・ <span style="font-family:'Noto Serif KR',serif;font-weight:600">같은 한자가 쓰인 단어</span></div><div class="rel-grid">${cards}</div></div>`;
}

function render(){
  const q=QUESTIONS[idx];
  const choices=buildChoices(q);
  locked=false;
  pbar.style.width=(idx/total*100)+'%';
  card.innerHTML=`
    <div class="qmeta">
      <span class="qnum">第 ${idx+1} 問 / ${total}</span>
      <span class="qtag">単語 ・ 음독 → 한국 한자음</span>
    </div>
    <div class="prompt">
      <div class="lead">この単語の <b>韓国漢字音(ハングル)</b> はどれ？</div>
      <span class="word">${q.word}</span>
      <div class="reading">
        <span class="jp-read">${q.jp}</span>
        <span class="mean">意味：${q.mean}</span>
      </div>
      <div class="ask">正しい <em>한국 한자음</em> を1つ選んでください</div>
    </div>
    <div class="choices" id="choices">
      ${choices.map((c,i)=>`<button class="choice" data-val="${c}"><span class="idx">${i+1}</span>${c}</button>`).join('')}
    </div>
    <div class="explain" id="explain"></div>
    <div class="nav"><button class="btn hidden" id="nextBtn"></button></div>
  `;
  card.querySelectorAll('.choice').forEach(b=>b.addEventListener('click',()=>onPick(b,q)));
}

function onPick(btn,q){
  if(locked) return; locked=true;
  const correct=btn.dataset.val===q.answer;
  if(correct){ score++; scoreNow.textContent=score; }
  card.querySelectorAll('.choice').forEach(b=>{
    b.disabled=true;
    if(b.dataset.val===q.answer) b.classList.add('correct');
    else if(b===btn) b.classList.add('wrong');
    else b.classList.add('muted');
  });
  const ex=document.getElementById('explain');
  ex.innerHTML=`
    <div class="explain-head ${correct?'ok':'ng'}">
      <span class="mk">${correct?'◎':'✕'}</span>
      ${correct?'正解です！ 정답이에요!':`残念… 正解は <span class="ko" style="margin-left:4px">${q.answer}</span>`}
    </div>
    <div class="explain-body">
      <span class="rule-chip">対応法則</span> ${q.rule}
      <p style="margin-top:10px">${q.word}（${q.jp}）の韓国漢字音は <span class="ko">${q.answer}</span> です。${q.note}</p>
      <div class="breakdown">${q.bd.map(x=>`<span class="syl">${x}</span>`).join(' ／ ')}</div>
      ${buildRelatedHTML(q)}
    </div>
  `;
  requestAnimationFrame(()=>ex.classList.add('show'));
  const nb=document.getElementById('nextBtn');
  nb.classList.remove('hidden');
  nb.textContent=(idx===total-1)?'結果を見る ▶':'次の問題 ▶';
  nb.onclick=()=>{ if(idx===total-1){showResult();} else {idx++;render();window.scrollTo({top:0,behavior:'smooth'});} };
}

function showResult(){
  pbar.style.width='100%';
  const pct=Math.round(score/total*100);
  let grade,msg;
  if(pct===100){grade='완벽! 만점이에요 🎉';msg='全問正解！ 한·일 한자음의 대응 감각이 완전히 잡혔네요.';}
  else if(pct>=80){grade='훌륭해요 👏';msg='対応法則がしっかり身についています。間違えた単語の解説をもう一度確認しましょう。';}
  else if(pct>=60){grade='좋아요, 거의 다 왔어요';msg='基本はOK。ㅅㅈㅊ系や濁る例外(が行・だ行・ば行)を重点的に復習すると伸びます。';}
  else if(pct>=40){grade='조금만 더!';msg='母音・初声・終声の3つの対応を見ながら、もう一度挑戦してみましょう。';}
  else{grade='화이팅! 다시 도전해요';msg='まずはパッチムの対応 ㄱ→く / ㄴㅁ→ん / ㄹ→つ から覚えるのがおすすめです。';}
  const C=2*Math.PI*70, off=C*(1-pct/100);
  card.innerHTML=`
    <div class="result show">
      <div class="ring">
        <svg width="160" height="160">
          <circle cx="80" cy="80" r="70" fill="none" stroke="#e7dcc4" stroke-width="14"/>
          <circle cx="80" cy="80" r="70" fill="none" stroke="url(#g)" stroke-width="14" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}" id="ringFill"/>
          <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7fae87"/><stop offset="1" stop-color="#c8362f"/></linearGradient></defs>
        </svg>
        <div class="pct"><b>${pct}</b><span>${score} / ${total} 正解</span></div>
      </div>
      <div class="big">${score}<span style="font-size:1.5rem;color:#bdae93">/${total}</span></div>
      <div class="grade">${grade}</div>
      <p class="msg">${msg}</p>
      <button class="btn" id="again">もう一度挑戦 ・ 다시 풀기 ↻</button>
    </div>`;
  const rf=document.getElementById('ringFill');
  requestAnimationFrame(()=>{rf.style.transition='stroke-dashoffset 1.1s cubic-bezier(.16,1,.3,1)';rf.style.strokeDashoffset=off;});
  document.getElementById('again').onclick=()=>{idx=0;score=0;scoreNow.textContent=0;render();window.scrollTo({top:0,behavior:'smooth'});};
}

render();
</script>
</body>
</html>
